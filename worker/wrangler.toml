name = "ai-shuangweihuixing"
main = "worker.js"
compatibility_date = "2024-12-01"

# KV Namespace for knowledge base storage
# 创建命令: npx wrangler kv:namespace create KB_STORE
# 创建后把返回的 id 填到这里
[[kv_namespaces]]
binding = "KB_STORE"
id = "YOUR_KV_NAMESPACE_ID"

# 环境变量（敏感信息，通过 wrangler secret 设置）
# npx wrangler secret put DEEPSEEK_API_KEY
# npx wrangler secret put ADMIN_KEY
