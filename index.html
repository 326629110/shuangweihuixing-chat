<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>双尾星 | AI蒸馏版</title>
  <style>
    :root {
      /* 亮色模式 */
      --bg-color: #ededed;
      --chat-bg: #f5f5f5;
      --nav-bg: #2c2c2c;
      --nav-text: #ffffff;
      --user-bubble: #07c160;
      --user-text: #ffffff;
      --bot-bubble: #ffffff;
      --bot-text: #333333;
      --input-bg: #ffffff;
      --input-text: #333333;
      --input-border: #e0e0e0;
      --send-btn: #07c160;
      --send-btn-text: #ffffff;
      --time-color: #999999;
      --status-online: #4ade80;
      --status-offline: #ef4444;
      --thinking-color: #888888;
      --shadow: rgba(0, 0, 0, 0.1);
      --thinking-bg: #f0f0f0;
      --thinking-border: #d0d0d0;
      --search-bg: #fff8e1;
      --search-text: #8d6e00;
    }

    [data-theme="dark"] {
      /* 深色模式 */
      --bg-color: #1a1a1a;
      --chat-bg: #1a1a1a;
      --nav-bg: #2d2d2d;
      --nav-text: #ffffff;
      --user-bubble: #25d366;
      --user-text: #ffffff;
      --bot-bubble: #3a3a3a;
      --bot-text: #e0e0e0;
      --input-bg: #2d2d2d;
      --input-text: #e0e0e0;
      --input-border: #404040;
      --send-btn: #25d366;
      --send-btn-text: #ffffff;
      --time-color: #888888;
      --status-online: #4ade80;
      --status-offline: #ef4444;
      --thinking-color: #888888;
      --shadow: rgba(0, 0, 0, 0.3);
      --thinking-bg: #2a2a2a;
      --thinking-border: #444444;
      --search-bg: #2a2500;
      --search-text: #ffd54f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background-color: var(--bg-color);
      color: var(--bot-text);
      overflow: hidden;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 800px;
      margin: 0 auto;
      background-color: var(--chat-bg);
    }

    /* 顶部导航栏 */
    .nav-bar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background-color: var(--nav-bg);
      color: var(--nav-text);
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 12px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .nav-info {
      flex: 1;
    }

    .nav-title {
      font-size: 16px;
      font-weight: 600;
    }

    .nav-status {
      display: flex;
      align-items: center;
      font-size: 12px;
      margin-top: 2px;
      color: rgba(255, 255, 255, 0.7);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--status-online);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .status-dot.offline {
      background-color: var(--status-offline);
      animation: none;
    }

    .nav-distilled-tag {
      font-size: 10px;
      background: linear-gradient(135deg, rgba(255,165,0,0.25), rgba(255,100,50,0.2));
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 6px;
      color: rgba(255,200,150,0.9);
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .nav-model-badge {
      font-size: 10px;
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }

    .nav-version-badge {
      font-size: 10px;
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 4px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }

    .nav-refresh-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 8px;
      transition: background 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .nav-refresh-btn:hover {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      transform: rotate(90deg);
    }

    .nav-refresh-btn:active {
      transform: rotate(180deg);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* 消息区域 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .message.bot .message-avatar {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .message-content {
      max-width: 70%;
      margin: 0 10px;
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: 0 1px 2px var(--shadow);
    }

    .message.user .message-bubble {
      background-color: var(--user-bubble);
      color: var(--user-text);
      border-top-right-radius: 4px;
    }

    .message.bot .message-bubble {
      background-color: var(--bot-bubble);
      color: var(--bot-text);
      border-top-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--time-color);
      margin-top: 4px;
      text-align: right;
    }

    .message.bot .message-time {
      text-align: left;
    }

    /* 欢迎消息 */
    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: var(--time-color);
    }

    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .welcome-text {
      font-size: 14px;
      line-height: 1.6;
    }

    /* 加载配置状态 */
    .config-loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--time-color);
    }

    .config-loading-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: breathe 1.8s ease-in-out infinite;
    }

    .config-loading-text {
      font-size: 14px;
      line-height: 1.6;
    }

    /* 深度思考状态指示 */
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
    }

    .status-indicator.thinking-status {
      color: var(--thinking-color);
    }

    .status-indicator.search-status {
      color: var(--search-text);
      background: var(--search-bg);
      border-radius: 8px;
      padding: 6px 12px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    /* 呼吸动画 */
    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .breathing {
      animation: breathe 1.8s ease-in-out infinite;
    }

    /* 正在思考动画（旧的点动画，作为备用） */
    .thinking-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      color: var(--thinking-color);
    }

    .thinking-dot {
      width: 8px;
      height: 8px;
      background-color: var(--thinking-color);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .thinking-dot:nth-child(1) { animation-delay: -0.32s; }
    .thinking-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* 思考过程折叠区域 */
    .reasoning-toggle {
      margin-top: 6px;
      margin-bottom: 4px;
    }

    .reasoning-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--thinking-bg);
      border: 1px solid var(--thinking-border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--thinking-color);
      cursor: pointer;
      transition: background 0.2s;
      outline: none;
    }

    .reasoning-toggle-btn:hover {
      background: var(--thinking-border);
    }

    .reasoning-toggle-btn .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }

    .reasoning-toggle-btn.expanded .arrow {
      transform: rotate(90deg);
    }

    .reasoning-content {
      display: none;
      margin-top: 6px;
      padding: 10px 12px;
      background: var(--thinking-bg);
      border: 1px solid var(--thinking-border);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: var(--thinking-color);
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 300px;
      overflow-y: auto;
    }

    .reasoning-content.show {
      display: block;
    }

    /* 输入区域 */
    .input-area {
      display: flex;
      align-items: flex-end;
      padding: 10px 12px;
      background-color: var(--chat-bg);
      border-top: 1px solid var(--input-border);
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      align-items: flex-end;
      background-color: var(--input-bg);
      border-radius: 24px;
      padding: 8px 16px;
      border: 1px solid var(--input-border);
      max-height: 120px;
    }

    .input-box {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--input-text);
      font-size: 15px;
      line-height: 1.4;
      resize: none;
      min-height: 24px;
      max-height: 80px;
      overflow-y: auto;
    }

    .input-box::placeholder {
      color: var(--time-color);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background-color: var(--send-btn);
      color: var(--send-btn-text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: 10px;
      transition: transform 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* 错误提示 */
    .error-toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ef4444;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 1000;
      animation: slideDown 0.3s ease;
      max-width: 90%;
      text-align: center;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: rgba(128, 128, 128, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: rgba(128, 128, 128, 0.5);
    }

    /* 响应式布局 */
    @media (max-width: 480px) {
      .nav-bar {
        padding: 10px 14px;
      }

      .nav-avatar {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      .nav-title {
        font-size: 15px;
      }

      .message-content {
        max-width: 80%;
      }

      .message-avatar {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }

      .input-area {
        padding: 8px 10px;
      }

      .send-btn {
        width: 40px;
        height: 40px;
        margin-left: 8px;
      }
    }

    @media (min-width: 768px) {
      .app-container {
        border-left: 1px solid var(--input-border);
        border-right: 1px solid var(--input-border);
      }
    }
  
    /* 引用来源卡片 */
    .citations-section {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed #d0d0d0;
    }
    .citations-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .citation-card {
      display: block;
      margin: 6px 0;
      padding: 8px 12px;
      background: #f8f8f8;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      font-size: 13px;
      line-height: 1.5;
    }
    .citation-card:hover {
      background: #f0f0f0;
    }
    .citation-source {
      font-weight: 600;
      color: #333;
    }
    .citation-date {
      color: #888;
      font-size: 12px;
      margin-left: 6px;
    }
    .citation-credibility {
      display: inline-block;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      font-weight: 500;
    }
    .citation-credibility.high {
      background: #dcfce7;
      color: #166534;
    }
    .citation-credibility.medium {
      background: #fef9c3;
      color: #854d0e;
    }
    .citation-credibility.low {
      background: #fee2e2;
      color: #991b1b;
    }
    .citation-url {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-top: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
</style>

  <script>
    // =============================================

    const DEEPSEEK_MODEL = 'deepseek-v4-flash';

    // 搜索相关配置
    const SEARCH_KEYWORDS = [
      '最新', '今天', '现在', '刚刚', '局势', '动态', '新闻', '发生',
      '战争', '冲突', '协议', '谈判', '制裁', '伊朗', '以色列', '美国',
      '俄罗斯', '乌克兰', '中东', '叙利亚', '黎巴嫩', '真主党',

    // ---- 降级版人格 Prompt（精简版，配置加载失败时使用）----
    const FALLBACK_PROMPT = `你现在是"双尾彗星"，B站知识型UP主，战锤背景党、业余历史研究者、业余军事爱好者，自称"大角鼠"。

【绝对禁止】
- 禁止使用新闻简报格式（标题+分点列表+结论）
- 禁止使用"一、二、三"或"首先、其次、最后"的结构化格式
- 禁止使用感叹号

【事实准确性红线】
1. 没有搜索结果时，涉及时效性问题必须承认信息局限
2. 引用书籍只允许模糊引用："关于XXX的那本书"——禁止编造具体书名+作者

【必须遵守】

- 有搜索结果时：用分析框架解读，不复述
- 无搜索结果时：承认信息局限，只做框架性分析，禁止编造具体事件

【引用来源规范（编号引用制）】
引用来源时只在相关事实后用方括号标注编号，如[1][3]。
严禁在回答中输出任何 http:// 或 https:// 开头的网址。
编号对应的是搜索结果的序号。`;

    // ---- 清除旧版缓存 ----
    (function clearLegacyCache() {
      const keysToRemove = [];
      for (let i = 0; i < sessionStorage.length; i++) {
        const key = sessionStorage.key(i);
        if (key && key.startsWith('ds_') && !key.startsWith('ds_v2_')) {
          keysToRemove.push(key);
        }
      }
      keysToRemove.forEach(k => sessionStorage.removeItem(k));
      if (keysToRemove.length > 0) {
        console.log('已清除旧版缓存:', keysToRemove.length, '项');
      }
    })();

    // ---- 知识库检索相关函数 ----
    function extractKBKeywords(text) {
      // 简单的中文关键词提取：去除停用词，提取2-8字的中文词组
      const stopWords = new Set(['的', '了', '在', '是', '我', '有', '和', '就', '不', '人', '都', '一', '一个', '上', '也', '很', '到', '说', '要', '去', '你', '会', '着', '没有', '看', '好', '自己', '这', '他', '她', '它', '们', '那', '被', '从', '对', '与', '以', '及', '等', '中', '为', '或', '而', '但', '其', '之', '将', '于', '可以', '已', '通过', '进行', '分析', '相关', '核心', '主要', '关于', '以下', '以上', '包括', '以及', '其中', '如果', '因为', '所以', '但', '而且', '虽然', '然而', '因此', '什么', '怎么', '如何']);

      // 提取中文词组（2-8字）
      const chineseWords = text.match(/[\u4e00-\u9fff]{2,8}/g) || [];
      // 提取英文词组
      const englishWords = text.match(/[a-zA-Z][a-zA-Z0-9\-]{1,20}/g) || [];

      const allWords = [...chineseWords, ...englishWords]
        .map(w => w.toLowerCase())
        .filter(w => !stopWords.has(w) && w.length >= 2);

      // 去重
      return [...new Set(allWords)];
    }

    function searchKnowledgeBase(query) {
      if (KNOWLEDGE_CHUNKS.length === 0) return '';

      const queryKeywords = extractKBKeywords(query);
      if (queryKeywords.length === 0) return '';

      // 为每个chunk计算匹配分数
      const scored = KNOWLEDGE_CHUNKS.map((chunk, idx) => {
        let score = 0;
        const matchedKeywords = [];

        for (const kw of queryKeywords) {
          // 标题匹配（权重高）
          if (chunk.title.includes(kw)) {
            score += 3;
            matchedKeywords.push(kw);
          }
          // 关键词列表匹配
          if (chunk.keywords.includes(kw)) {
            score += 2;
            matchedKeywords.push(kw);
          }
          // 内容匹配（权重低）
          if (chunk.content.includes(kw)) {
            score += 1;
          }
        }

        return { chunk, score, matchedKeywords, idx };
      });

      // 过滤得分为0的，按分数降序
      const matched = scored
        .filter(s => s.score > 0)
        .sort((a, b) => b.score - a.score);

      // 取top 8（控制注入量）
      const topChunks = matched.slice(0, 8);

      if (topChunks.length === 0) return '';

      // 构建注入文本
      let text = '\n\n## 以下是从知识库中检索到的相关条目（与当前问题最相关的知识）\n';
      for (const m of topChunks) {
        text += '\n' + m.chunk.content + '\n';
      }
      text += '\n【提示】以上是从你的知识库中检索到的与当前问题最相关的条目。请优先使用这些条目中的信息，结合搜索结果进行框架性分析。知识库条目中未提及的最新事件请使用搜索结果补充。';

      console.log(`知识库检索: query="${query}", 匹配${topChunks.length}/${KNOWLEDGE_CHUNKS.length}块, 关键词: ${queryKeywords.slice(0,10).join(',')}`);
      return text;
    }

    // ---- 中文关键词提取 ----
    function extractKeywords(text) {
      // v2.8 智能关键词提取：通篇理解用户问题，按话题分别搜索
      const queries = [];
      const entities = [];
      let timeHint = '';
      
      // 1. 提取时间提示
      const TIME_WORDS = ['最新', '近一周', '今天', '昨天', '本周', '上周', '最近', '目前', '现在', '近期', '进度', '发售', '确认'];
      for (const tw of TIME_WORDS) {
        if (text.includes(tw)) { timeHint = tw; break; }
      }
      
      // 2. 按标点符号分割成短句
      const sentences = text.split(/[？?！!。，,；;：:]/).map(s => s.trim()).filter(s => s.length >= 4);
      
      // 3. 对每个短句生成搜索查询
      for (const sentence of sentences) {
        // 移除常见疑问词，保留核心内容
        let query = sentence
          .replace(/^(什么|怎么|有没有|是否|可以|能否|请问|告诉|我|你|给|分析|一下)/, '')
          .replace(/(吗|呢|吧|啊|呀)/g, '')
          .trim();
        
        // 如果清理后长度合适（4-50字），加入查询列表
        if (query.length >= 4 && query.length <= 50) {
          queries.push(query);
        }
        
        // 尝试提取实体（名词短语）
        const words = query.match(/[A-Za-z]+[A-Za-z0-9]*|[\u4e00-\u9fa5]+/g) || [];
        for (const word of words) {
          if (word.length >= 2 && !['什么', '怎么', '有没有', '是否', '可以', '能否', '请问', '告诉', '分析'].includes(word)) {
            entities.push(word);
          }
        }
        
        // 最多3个查询
        if (queries.length >= 3) break;
      }
      
      // 4. 兜底：如果没提取到查询，用完整问题（截取前50字）
      if (queries.length === 0) {
        const fallback = text.substring(0, 50).trim();
        if (fallback.length >= 4) {
          queries.push(fallback);
        }
      }
      
      console.log('[v2.8] 提取的查询:', queries, '实体:', entities, '时间:', timeHint);
      return { entities: [...new Set(entities)], timeHint, queries: [...new Set(queries)].slice(0, 3) };
    }

    // ---- Wikipedia API 搜索（CORS 原生支持）----
    async function searchWikipedia(query) {
      const results = [];
      try {
        const searchUrl = `https://zh.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srlimit=5&format=json&origin=*&srprop=snippet|timestamp`;
        const resp = await fetch(searchUrl, { signal: AbortSignal.timeout(8000) });
        if (!resp.ok) return results;

        const data = await resp.json();
        const searchItems = data?.query?.search || [];

        for (const item of searchItems) {
          const snippet = item.snippet
            .replace(/<[^>]+>/g, '')
            .replace(/&quot;/g, '"')
            .replace(/&amp;/g, '&')
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>')
            .trim();

          results.push({
            title: item.title,
            snippet: snippet,
            source: 'Wikipedia',
            url: `https://zh.wikipedia.org/wiki/${encodeURIComponent(item.title)}`,
            date: item.timestamp ? item.timestamp.split('T')[0] : ''
          });
        }
      } catch (e) {
        console.warn('Wikipedia 搜索失败:', query, e.message);
      }
      return results;
    }

        '美国':'USA','以色列':'Israel','伊朗':'Iran','俄罗斯':'Russia','中国':'China',

      }[w] || w) : w));
      const searchQ = enQuery || query;
      try {
        const url = 'https://api.gdeltproject.org/api/v2/doc/doc?query='
          + encodeURIComponent(searchQ)
          + '&mode=artlist&format=json&maxrecords=6&sourcelang=eng&sort=datedesc';
        const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
        if (resp.status === 429) {
          console.warn('GDELT 限速(429)，跳过后续请求');
          return results;
        }
        if (!resp.ok) return results;
        const data = await resp.json();
        const articles = data?.articles || [];
        for (const a of articles) {
          results.push({
            title: a.title || '',
            snippet: (a.snippet || a.summary || '').replace(/<[^>]+>/g, '').trim().substring(0, 300),
            source: a.source?.name || a.domain || 'GDELT',
            url: a.url || '',
            date: (a.seendate || '').split('T')[0] || ''
          });
        }
      } catch (e) {
        console.warn('GDELT 搜索失败:', query, e.message);
      }
      return results;
    }

    async function performSearch(userText, elems) {
      let allResults = [];
      const seenTitles = new Set();
      const { entities, timeHint, queries } = extractKeywords(userText);
      const searchQueries = queries.length > 0 ? queries : [userText.substring(0, 30)];
      console.log('[v2.7] 分层搜索，查询:', searchQueries);

      for (const q of searchQueries) {
        // 第0层: AnySearch（综合搜索，CORS直连，最高优先级）
        const asR = await searchAnySearch(q);
        for (const r of asR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
        if (asR.length > 0) { updateSearchProgress(elems, 'AnySearch综合搜索', asR, allResults); await new Promise(r => setTimeout(r, 2000)); }

        // 第1层: 国内官方权威媒体直搜
        const cnR = await searchChineseOfficialMedia(q);
        for (const r of cnR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
        if (cnR.length > 0) { updateSearchProgress(elems, '官方媒体', cnR, allResults); await new Promise(r => setTimeout(r, 3500)); }

        // 第2层: 百度网页搜索
        const baiduR = await searchBaiduWeb(q);
        for (const r of baiduR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
        if (baiduR.length > 0) { updateSearchProgress(elems, '百度', baiduR, allResults); await new Promise(r => setTimeout(r, 2500)); }

        // 第3层: Bing搜索
        const bingR = await searchBing(q);
        for (const r of bingR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
        if (bingR.length > 0) { updateSearchProgress(elems, 'Bing', bingR, allResults); await new Promise(r => setTimeout(r, 2500)); }

        // 第4层: GDELT全球新闻（每查询间隔5.5秒避免限速）
        const gR = await searchGDELT(q);
        for (const r of gR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
        if (gR.length > 0) { updateSearchProgress(elems, 'GDELT全球新闻', gR, allResults); await new Promise(r => setTimeout(r, 5500)); }

        // 第5层: 中文Wikipedia（间接引用官方媒体）
        const zhR = await searchWikipedia(q);
        for (const r of zhR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
        if (zhR.length > 0) updateSearchProgress(elems, '中文百科', zhR, allResults);

        // 第6层: 英文Wikipedia（国际背景）
        if (entities.length > 0) {
          const enQ = translateEntities(entities);
          if (enQ) {
            const enR = await searchWikipediaEN(enQ);
            for (const r of enR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
          }
        }

        if (allResults.length >= 20) break;
      }

      // 第4层: DuckDuckGo补充（不足10条时）
      if (allResults.length < 10 && searchQueries.length > 0) {
        const ddR = await searchDuckDuckGo(searchQueries[0]);
        for (const r of ddR) { if (!seenTitles.has(r.title)) { seenTitles.add(r.title); allResults.push(r); } }
      }

      console.log('[v2.7] 搜索完成，共 ' + allResults.length + ' 条结果');
      return allResults;
    }

    // ---- 格式化搜索结果为文本 ----
    function formatSearchResults(results) {
      if (results.length === 0) {
        return '\n\n【搜索提示】搜索引擎未返回直接相关的最新结果。请基于你的知识库进行框架性分析。你可以说"关于最近几天的具体动态我暂时没有搜到"，然后基于知识库中的已知信息展开分析。绝对禁止编造搜索结果和知识库中都不存在的具体事件、数据、来源。';
      }
      var text = '\n\n## 以下搜索结果来自真实搜索引擎（按来源优先级排列）\n';
      for (var i = 0; i < results.length; i++) {
        var r = results[i];
        var tier = '';
        if (r.tier === 1 || ['新华社', '人民日报', '央视'].indexOf(r.source) >= 0) tier = '[权威媒体·第1层] ';
        else if (r.source === '百度') tier = '[百度·第2层] ';
        else if (r.source === '百度百科') tier = '[中国百科·第2层] ';
        else if (r.source === 'Bing') tier = '[Bing·第3层] ';
        else if (r.source.indexOf('GDELT') === 0) tier = '[国际新闻·第4层] ';
        else if (r.source === 'AnySearch') tier = '[综合搜索·第0层] ';
        else if (r.source === 'Wikipedia') tier = '[中文百科·第5层] ';
        else if (r.source === 'Wikipedia(EN)') tier = '[国际背景·第6层] ';
        else tier = '[补充源·第7层] ';
        text += '\n[' + (i + 1) + '] ' + tier + r.title + '（来源：' + r.source;
        if (r.date) text += '，日期：' + r.date;
        text += '）';
        if (r.snippet) text += '\n    ' + r.snippet;
        text += '\n';
      }
      text += '\n【来源层级说明】\n第0层（最高优先）=AnySearch综合搜索（国内服务、多源聚合、CORS直连）\\n第1层=新华社/人民日报/央视等国内官方权威媒体直搜结果\n第2层=百度网页搜索+百度百科（中文信息补充）+知识库中的书籍和亲历者一手资料\n第3层=Bing搜索（多源补充）\n第4层=GDELT全球新闻（Reuters/AP/BBC等，不同视角补充）\n第5层=中文Wikipedia（间接引用官方媒体）\n第6层=英文Wikipedia（国际背景）\n第7层=DuckDuckGo等补充源\n引用时严格按层级优先使用第1层来源，第4-7层仅作不同视角补充。所有引用必须标注具体媒体名称+日期+事实，严禁编造不存在的来源。';
      text += '\n【引用格式规范（极其重要）】\n在回答中引用来源时，只在相关事实后面用方括号标注编号，如"据新华社报道[1]"、"发售日已确认为11月19日[2][3]"。\n严禁在回答中写任何 http:// 或 https:// 开头的网址链接。你只能使用 [数字] 格式的编号来引用来源。\n引用知识库条目时使用 [KB-编号] 格式，如"[KB-12]中分析过这个框架"。';
      // 存储搜索结果供后续渲染使用
      window._lastSearchResults = results;
      return text;
    }

    // ---- 发送消息（核心流程） ----

      inputBox.value = '';
      inputBox.style.height = 'auto';

      if (welcomeMsg) welcomeMsg.remove();

      // 显示用户消息
      const userTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      addMessageToUI('user', content, userTime);
      saveMessage('user', content, userTime);
      messageHistory.push({ role: 'user', content });

      // 创建流式 bot 消息占位
      const elems = createStreamingBotMessage();
      let searchContext = '';
      let lastSearchResults = [];

        // === 步骤1：判断是否需要搜索 ===
        if (needsSearch(content)) {

          year: 'numeric', month: 'long', day: 'numeric', weekday: 'long',
          hour: '2-digit', minute: '2-digit'
        });

        // 构造完整 system prompt：人格规则 + 知识库 + 按需检索 + 当前时间 + 搜索结果
        let systemContent = SYSTEM_PROMPT;
        if (KNOWLEDGE_BASE) {
          systemContent += '\n\n' + KNOWLEDGE_BASE;  // 只包含PERSONALITY+SYSTEM_PROMPT+DISTILLATION
        }

          },

            max_tokens: 2000,
            temperature: 0.3,
            stream: true,
            thinking: { type: 'enabled' }
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          let errMsg = `API 请求失败: ${response.status}`;
          try {
            const errJson = JSON.parse(errText);
            errMsg = errJson.error?.message || errMsg;
          } catch (e) {}
          throw new Error(errMsg);
        }

        // === 步骤3：解析 SSE 流 ===
        // 流式输出时实时显示内容生成进度
        let streamingUpdateTimer = setInterval(function() {
          if (!elems.statusArea) { clearInterval(streamingUpdateTimer); return; }
          const reasonLen = reasoningContent.length;
          const answerLen = answerContent.length;
          const phase = isThinkingPhase ? '思考中' : '生成回答中';
          let sh = '<div style="padding:10px 14px;background:#f8f9fa;border-radius:10px;font-size:13px;line-height:1.8;border:1px solid #e9ecef;max-height:200px;overflow-y:auto;">';
          sh += '<div style="color:#16a34a;font-size:12px;">\u2705 搜索完成</div>';
          sh += '<div style="color:#' + (isThinkingPhase ? '7c3aed' : '6b7280') + ';font-weight:600;">\ud83d\udcac ' + phase + '\uff08' + (reasonLen + answerLen) + ' 字\uff09</div>';
          if (reasonLen > 0) {
            const preview = reasoningContent.substring(Math.max(0, reasonLen - 100)).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            sh += '<div style="color:#7c3aed;font-size:11px;margin-top:4px;padding:4px 8px;background:#f5f3ff;border-radius:6px;border-left:3px solid #a78bfa;">\ud83e\udde0 ' + preview + '</div>';
          }
          if (answerLen > 0) {
            const preview = answerContent.substring(Math.max(0, answerLen - 100)).replace(/</g, '&lt;').replace(/>/g, '&gt;');
            sh += '<div style="color:#334155;font-size:11px;margin-top:4px;padding:4px 8px;background:#f8fafc;border-radius:6px;border-left:3px solid #94a3b8;">\ud83d\udcdd ' + preview + '</div>';
          }
          sh += '</div>';
          elems.statusArea.innerHTML = sh;
        }, 2000);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let reasoningContent = '';
        let answerContent = '';
        let isThinkingPhase = true;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;

            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta;
              if (!delta) continue;

              // 处理 reasoning_content（思考过程）
              if (delta.reasoning_content) {
                if (isThinkingPhase) {
                  isThinkingPhase = false;
                  if (elems.reasoningSection && !elems.reasoningSection.classList.contains('expanded')) {
                    elems.reasoningSection.classList.add('expanded');
                    elems.reasoningSection.style.display = 'block';
                    if (elems.reasoningToggle) elems.reasoningToggle.style.display = 'block';
                  }
                }
                reasoningContent += delta.reasoning_content;
                if (elems.reasoningDiv) {
                  elems.reasoningDiv.textContent = reasoningContent;
                  if (elems.reasoningToggle.style.display === 'none') {
                    elems.reasoningToggle.style.display = 'block';
                  }
                }
              }

              // 处理 content（正式回答）
              if (delta.content) {
                answerContent += delta.content;
                elems.bubble.textContent = answerContent;
                scrollToBottom();
              }
            } catch (e) {
              // 解析单行失败则跳过
            }
          }
        }

        // === 步骤4：流结束，最终处理 ===
        if (typeof streamingUpdateTimer !== 'undefined') clearInterval(streamingUpdateTimer);

        if (!answerContent.trim()) {
          throw new Error('未收到AI回复');
        }

        // === 步骤4.5：核查修正循环（最多3轮） ===
        let currentAnswer = answerContent;
        const MAX_CORRECTION_ROUNDS = 3;

        if (needsFactCheck(currentAnswer) && lastSearchResults.length > 0) {
          for (let round = 1; round <= MAX_CORRECTION_ROUNDS; round++) {
            // 显示核查进度（含证据和搜索来源）
            {
              let fch = '<div style="padding:10px 14px;background:#fffbeb;border-radius:10px;font-size:13px;line-height:1.7;border:1px solid #fde68a;max-height:250px;overflow-y:auto;">';
              fch += '<div style="color:#d97706;font-weight:600;margin-bottom:6px;">\ud83d\udd0e 事实核查（第' + round + '轮）</div>';
              fch += '<div style="color:#92400e;font-size:11px;margin-bottom:8px;">正在比对 ' + lastSearchResults.length + ' 条搜索结果中的事实性断言...</div>';
              const showResults = lastSearchResults.slice(0, 4);
              for (let ri = 0; ri < showResults.length; ri++) {
                const sr = showResults[ri];
                const snippet = (sr.snippet || '').substring(0, 60);
                fch += '<div style="font-size:12px;color:#334155;padding:3px 0 3px 10px;border-left:2px solid #fbbf24;margin-bottom:3px;">';
                fch += '<strong>[' + (ri+1) + ']</strong> ' + (sr.source || '来源') + ': ' + (sr.title || '').substring(0, 50);
                if (snippet) fch += '<br><span style="color:#64748b;font-size:11px;">' + snippet + '...</span>';
                fch += '</div>';
              }
              fch += '</div>';
              elems.statusArea.innerHTML = fch;
            }

            try {
              const issue = await factCheck(content, currentAnswer, lastSearchResults);

              if (!issue) {
                // 核查通过
                {
                  let dhtml = '<div style="padding:8px 12px;background:#f0fdf4;border-radius:10px;font-size:13px;border:1px solid #bbf7d0;">';
                  dhtml += '<div style="color:#16a34a;font-weight:600;">\u2705 事实核查通过</div>';
                  dhtml += '<div style="color:#15803d;font-size:12px;">回答中的事实性内容与搜索结果一致</div>';
                  dhtml += '</div>';
                  elems.statusArea.innerHTML = dhtml;
                  elems.statusArea.style.opacity = '1';
                  elems.statusArea.style.transition = 'opacity 0.5s';
                  setTimeout(function() { elems.statusArea.style.opacity = '0'; setTimeout(function() { elems.statusArea.innerHTML = ''; }, 500); }, 3000);
                }
                break;
              }

              // 核查发现问题
              if (round >= MAX_CORRECTION_ROUNDS) {
                setProgressStep(elems, 'done');
                const warnDiv = document.createElement('div');
                warnDiv.innerHTML = '⚠️ <strong style="color:#d97706;">自我纠错（第' + round + '轮）</strong>：<span style="color:#92400e;">' + escapeHtml(issue) + '</span><br><span style="color:#9ca3af;font-size:11px;">已达到最大修正次数，以上信息请自行核实</span>';
                warnDiv.style.cssText = 'font-size:12px;background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-top:8px;line-height:1.5;';
                elems.bubble.parentElement.appendChild(warnDiv);
                break;
              }

              // 显示发现的问题并修正
              {
                let chtml = '<div style="padding:10px 14px;background:#fef2f2;border-radius:10px;font-size:13px;line-height:1.7;border:1px solid #fecaca;">';
                chtml += '<div style="color:#dc2626;font-weight:600;margin-bottom:6px;">\u270f\ufe0f 发现错误，正在修正（第' + round + '轮）</div>';
                chtml += '<div style="color:#991b1b;font-size:12px;padding:4px 8px;background:#fff1f2;border-radius:6px;">' + escapeHtml(issue) + '</div>';
                chtml += '</div>';
                elems.statusArea.innerHTML = chtml;
              }
              const corrected = await correctAnswer(content, currentAnswer, issue, lastSearchResults, systemContent);

              if (!corrected) {
                const warnDiv = document.createElement('div');
                warnDiv.innerHTML = '⚠️ <strong style="color:#d97706;">自我纠错</strong>：<span style="color:#92400e;">' + escapeHtml(issue) + '</span>';
                warnDiv.style.cssText = 'font-size:12px;background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px 12px;margin-top:8px;line-height:1.5;';
                elems.bubble.parentElement.appendChild(warnDiv);
                break;
              }

              // 更新回答并重新渲染
              currentAnswer = corrected;
              renderCitations(elems.bubble, currentAnswer, lastSearchResults);
              scrollToBottom();
            } catch (e) {
              console.warn('核查第' + round + '轮出错:', e.message);
              setProgressStep(elems, 'done');
              break;
            }
          }
        } else {
          // 不需要核查，显示完成并淡出
          const { statusArea } = elems;
          statusArea.innerHTML = '<div style="padding:8px 12px;background:#f0fdf4;border-radius:10px;font-size:13px;border:1px solid #bbf7d0;"><div style="color:#16a34a;font-weight:600;">✅ 回答完成</div></div>';
          statusArea.style.opacity = '1';
          statusArea.style.transition = 'opacity 0.5s';
          setTimeout(function() { statusArea.style.opacity = '0'; setTimeout(function() { statusArea.innerHTML = ''; }, 500); }, 2000);
        }

        // 最终渲染引用来源
        renderCitations(elems.bubble, currentAnswer, lastSearchResults);

        // 保存到历史（使用可能经过修正的回答）
        const botTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        elems.timeDiv.textContent = botTime;
        saveMessage('assistant', currentAnswer.trim(), botTime);
        messageHistory.push({ role: 'assistant', content: currentAnswer.trim() });

      } catch (error) {
        clearStatus(elems);
        if (!elems.bubble.textContent.trim()) {
          elems.bubble.textContent = '出错了: ' + error.message;
          elems.bubble.style.color = '#ef4444';
        }
        console.error('Error:', error);
      } finally {
        isProcessing = false;
        sendBtn.disabled = inputBox.value.trim() === '';
        inputBox.focus();
      }
    }

    // ---- 工具函数 ----
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- 事实核查：规则引擎 ----
    function needsFactCheck(text) {
      const patterns = [
        /\d{4}年.{0,30}\d+/,                    // 年份+具体数字
        /据.{2,20}(报道|称|表示|透露|统计)/,      // "据...报道"类引用句式
        /根据.{2,20}(显示|数据|统计|报道|研究)/,   // "根据...显示"类
        /\S{2,6}(宣布|签署|发布|表示|称|强调).{2,30}(了|出|称)/,  // 人名+事件动词
        /\d+(\.\d+)?%/,                           // 百分比数据
        /(约|超过|达到|高达|将近).{0,5}\d+(亿|万|千|百|十)/,  // 精确数量
        /《.{2,30}》.{0,10}(著|写|编|说过|认为)/,  // 书名+作者断言
        /研究(表明|发现|显示|证实)/,                // "研究表明"类
      ];
      
      let matchCount = 0;
      for (const p of patterns) {
        if (p.test(text)) matchCount++;
      }
      // 至少命中2个模式才触发核查（避免误触发）
      return matchCount >= 2;
    }

    // ---- 事实核查：独立API调用 ----
    async function factCheck(userQuery, aiResponse, searchResults) {
      // 从搜索结果生成判定依据文本（编号+标题+摘要，不超过1500字）
      let searchResultsText = '';
      if (searchResults && searchResults.length > 0) {
        for (let i = 0; i < searchResults.length; i++) {
          const r = searchResults[i];
          searchResultsText += '[' + (i + 1) + '] ' + (r.title || '') + '（来源：' + (r.source || '') + (r.date ? '，日期：' + r.date : '') + '）';
          if (r.snippet) searchResultsText += ' ' + r.snippet;
          searchResultsText += '\n';
        }
        if (searchResultsText.length > 1500) {
          searchResultsText = searchResultsText.substring(0, 1500) + '\n...(已截断)';
        }
      }

      const checkMessages = [
        { 
          role: 'system', 
          content: '你是一个严格的事实核查员。你的任务是检查AI回答中是否存在事实性错误。只回复核查结果，不要多余解释。' 
        },
        {
          role: 'user',
          content: `请检查以下AI回答是否存在以下问题：
1. 编造了具体的事件、数据、日期或人物发言
2. 将不确定的信息表述为确定事实
3. 虚假引用（编造书名+作者、论文标题等）

${searchResultsText ? '以下是AI回答时可用的搜索结果（来自真实搜索引擎）：\n' + searchResultsText + '\n请根据以上搜索结果判断AI回答中的事实性断言是否与搜索结果一致。如果AI回答中的断言与搜索结果矛盾，或者AI回答编造了搜索结果中不存在的具体数据/事件，则指出问题。\n' : ''}
用户问题：${userQuery}
AI回答：${aiResponse}

规则：
- 如果发现问题，用一句话指出核心问题（不超过40字）
- 如果回答整体可靠或只是观点性内容，只回复"通过"
- 不要质疑观点和分析框架，只核查事实性断言`
        }
      ];

      const resp = await fetch(DEEPSEEK_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
        },
        body: JSON.stringify({
          model: DEEPSEEK_MODEL,
          messages: checkMessages,
          max_tokens: 100,
          temperature: 0.1,
          stream: false
        })
      });
      
      if (!resp.ok) return null;
      const data = await resp.json();
      const result = data.choices?.[0]?.message?.content?.trim();
      // 只有明确发现问题才返回，"通过"或空值返回null
      if (!result || result === '通过' || result.includes('通过')) return null;
      return result;
    }

    // ---- 事实核查：修正回答 ----
    async function correctAnswer(userQuery, originalAnswer, issue, searchResults, systemContent) {
      let searchResultsText = '';
      if (searchResults && searchResults.length > 0) {
        for (let i = 0; i < searchResults.length; i++) {
          const r = searchResults[i];
          searchResultsText += '[' + (i + 1) + '] ' + (r.title || '') + '（来源：' + (r.source || '') + (r.date ? '，日期：' + r.date : '') + '）';
          if (r.snippet) searchResultsText += ' ' + r.snippet;
          searchResultsText += '\n';
        }
        if (searchResultsText.length > 1500) {
          searchResultsText = searchResultsText.substring(0, 1500) + '\n...(已截断)';
        }
      }

      const corrMessages = [
        {
          role: 'system',
          content: systemContent
        },
        {
          role: 'user',
          content: userQuery
        },
        {
          role: 'assistant',
          content: originalAnswer
        },
        {
          role: 'user',
          content: `事实核查发现了以下问题：${issue}

请根据以上问题修正你的回答。要求：
1. 只修正与事实核查问题相关的部分，保留正确的分析和观点
2. 对于不确定的信息，明确说明"这个信息我没有确切来源"
3. 引用来源时只使用编号 [1] [2] 格式，严禁写任何URL
4. 输出修正后的完整回答，不要解释修正过程`
        }
      ];

      const resp = await fetch(DEEPSEEK_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
        },
        body: JSON.stringify({
          model: DEEPSEEK_MODEL,
          messages: corrMessages,
          max_tokens: 2000,
          temperature: 0.2,
          stream: false
        })
      });

      if (!resp.ok) return null;
      const data = await resp.json();
      return data.choices?.[0]?.message?.content?.trim() || null;
    }

    // ---- 解析并渲染引用来源 ----
    // ---- 从DuckDuckGo代理/跳转URL中提取原始URL ----
    function extractOriginalUrl(url) {
      if (!url) return '';
      // DuckDuckGo redirect: https://duckduckgo.com/l/?uddg=ENCODED_URL&rut=...
      const uddgMatch = url.match(/[?&]uddg=([^&]+)/);
      if (uddgMatch) {
        try { return decodeURIComponent(uddgMatch[1]); } catch(e) {}
      }
      // allorigins/win 等代理URL
      const proxyMatch = url.match(/(?:raw\/?url=|quest=|\?=)(https?%3A[^&]+)/);
      if (proxyMatch) {
        try { return decodeURIComponent(proxyMatch[1]); } catch(e) {}
      }
      return url;
    }

    function renderCitations(bubbleEl, fullText, searchResults) {
      // 编号引用制：扫描 [数字] 格式引用，替换为可点击上标链接
      if (!searchResults || searchResults.length === 0) return;

      // 收集正文中实际引用的编号
      const citedNums = new Set();
      let processedText = fullText;

      // 替换 [数字] 为上标链接（排除 [KB-数字] 知识库引用）
      processedText = processedText.replace(/\[(\d+)\]/g, function(match, numStr) {
        const num = parseInt(numStr, 10);
        if (num < 1 || num > searchResults.length) return match; // 越界保留原文本
        citedNums.add(num);
        const r = searchResults[num - 1];
        const url = r.url ? extractOriginalUrl(r.url) : '#';
        return '<sup><a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">[' + num + ']</a></sup>';
      });

      // 知识库引用 [KB-数字] 暂时保留纯文本（不做映射）

      // 更新主内容
      bubbleEl.innerHTML = '';

      // 将处理后的文本写入 bubble（逐段落）
      const paragraphs = processedText.split('\n').filter(p => p.trim());
      for (const p of paragraphs) {
        const pEl = document.createElement('p');
        pEl.innerHTML = p;
        pEl.style.margin = '0.3em 0';
        bubbleEl.appendChild(pEl);
      }

      // 在底部生成参考来源区域（只列出被实际引用的）
      if (citedNums.size === 0) return;

      const sortedNums = Array.from(citedNums).sort((a, b) => a - b);
      let citeHtml = '<div class="citations-section"><div class="citations-title">📎 参考来源（' + sortedNums.length + '条）</div>';
      for (const num of sortedNums) {
        const r = searchResults[num - 1];
        const url = r.url ? extractOriginalUrl(r.url) : '';
        citeHtml += '<a class="citation-card" href="' + escapeHtml(url) + '" target="_blank" rel="noopener">';
        citeHtml += '<span class="citation-source">[' + num + '] ' + escapeHtml(r.source || '未知来源') + '</span>';
        if (r.title) citeHtml += '<span class="citation-date" style="margin-left:4px;">' + escapeHtml(r.title) + '</span>';
        if (r.date) citeHtml += '<span class="citation-date" style="margin-left:4px;">' + escapeHtml(r.date) + '</span>';
        citeHtml += '</a>';
      }
      citeHtml += '</div>';

      const citeDiv = document.createElement('div');
      citeDiv.innerHTML = citeHtml;
      bubbleEl.parentElement.appendChild(citeDiv.firstElementChild);
    }

    function scrollToBottom() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // 启动应用（异步，等待配置加载）
    init();
  </script>
